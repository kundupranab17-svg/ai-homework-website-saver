<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StudyGenius AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===== THEME ===== */
body.dark{background:#181818;color:white;}
body.light{background:#ffffff;color:#111;}
body{margin:0;font-family:system-ui;display:flex;height:100vh;transition:0.3s;}

/* ===== SPLASH ===== */
#splash{
position:fixed;width:100%;height:100%;
background:#0f172a;display:flex;justify-content:center;align-items:center;
z-index:9999;
}
#logoAnim{
width:80px;height:80px;border-radius:50%;
overflow:hidden;
animation:zoomFade 1.2s ease forwards;
}
#logoAnim img{width:100%;height:100%;object-fit:cover;}
@keyframes zoomFade{
0%{transform:scale(0.5);opacity:0;}
100%{transform:scale(1);}
}

/* ===== SIDEBAR ===== */
.sidebar{width:230px;background:#202123;padding:12px;display:flex;flex-direction:column;justify-content:space-between;}
.btn{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;cursor:pointer;}
.btn:hover{background:#2a2b32;}

.yourChats{
display:flex;justify-content:space-between;
cursor:pointer;color:#9ca3af;font-size:13px;margin-top:10px;
}

/* CHAT LIST */
#chatList{transition:0.3s;}
.chatItem{
display:flex;justify-content:space-between;
padding:8px;border-radius:6px;
}
.chatItem:hover{background:#2a2b32;}

.left{display:flex;gap:6px;}
.dot{width:6px;height:6px;background:white;border-radius:50%;}

/* ===== MAIN ===== */
.main{flex:1;display:flex;flex-direction:column;}

.topbar{
height:50px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 15px;
border-bottom:1px solid #444;
}

/* CAPSULE */
.planCapsule{
padding:4px 12px;
border-radius:20px;
background:#2a2a2a;
font-size:12px;
}

/* CHAT */
.chat{flex:1;padding:20px;overflow-y:auto;}

.message{
padding:14px;border-radius:14px;margin:10px 0;max-width:70%;
}
.user{margin-left:auto;background:#3b82f6;}
.bot{background:#242424;}

/* ACTION ICONS */
.actions{
display:flex;gap:10px;margin-top:6px;font-size:12px;opacity:0.7;
}
.actions span{cursor:pointer;}
.actions span:hover{opacity:1;}

/* INPUT */
.inputBar{padding:12px;border-top:1px solid #333;}
.inputBox{
display:flex;align-items:center;
gap:10px;background:#2a2a2a;
padding:10px;border-radius:20px;
}
input{flex:1;background:none;border:none;color:inherit;outline:none;}

/* NEW CHAT SCREEN */
#newChat{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
text-align:center;
}
#newChat h1{font-size:28px;margin-bottom:20px;}

/* DISCLAIMER */
.footer{
text-align:center;
font-size:11px;
opacity:0.6;
margin-top:6px;
}

/* UPGRADE POPUP */
#upgrade{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}
.popup{
background:#1f1f1f;
padding:20px;
border-radius:12px;
width:300px;
}
.popup button{
width:100%;padding:10px;margin-top:10px;
border:none;border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body class="dark">

<!-- SPLASH -->
<div id="splash">
<div id="logoAnim"><img src="logo.png"></div>
</div>

<div id="app" style="display:none; width:100%; display:flex;">

<!-- SIDEBAR -->
<div class="sidebar">
<div>

<div class="btn" onclick="showNewChat()">➕ New Chat</div>

<div class="yourChats" onclick="toggleChats()">
<span>Your Chats</span>
<span id="arrow">▼</span>
</div>

<div id="chatList">
<div class="chatItem">
<div class="left">
<div class="dot"></div>
<span>Example Chat</span>
</div>
<div>⋯</div>
</div>
</div>

</div>

<div>
<div onclick="openUpgrade()" class="btn">Upgrade Plan</div>
</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<div>StudyGenius AI</div>
<div class="planCapsule">Free</div>
</div>

<!-- NEW CHAT SCREEN -->
<div id="newChat">
<h1>What are you working on?</h1>
</div>

<div class="chat" id="chat"></div>

<div class="inputBar">
<div class="inputBox">
<input id="q" placeholder="Ask anything"
onkeydown="if(event.key==='Enter') sendMsg()">
<button onclick="sendMsg()">➤</button>
</div>
<div class="footer">
StudyGenius AI can make mistakes. Check important info.
</div>
</div>

</div>
</div>

<!-- UPGRADE -->
<div id="upgrade">
<div class="popup">
<h3>Upgrade Plan</h3>
<button>Free</button>
<button>Pro</button>
<button onclick="closeUpgrade()">Close</button>
</div>
</div>

<script>
/* SPLASH */
window.onload=()=>{
setTimeout(()=>{
splash.style.display="none";
app.style.display="flex";
},1200);

/* AUTO THEME */
let h=new Date().getHours();
if(h>=6 && h<18){
document.body.classList.remove("dark");
document.body.classList.add("light");
}
};

/* CHAT TOGGLE */
function toggleChats(){
let list=document.getElementById("chatList");
let arrow=document.getElementById("arrow");

if(list.style.display==="none"){
list.style.display="block";
arrow.innerText="▼";
}else{
list.style.display="none";
arrow.innerText="▶";
}
}

/* NEW CHAT */
function showNewChat(){
document.getElementById("chat").innerHTML="";
document.getElementById("newChat").style.display="block";
}

/* SEND MSG */
function sendMsg(){
let q=document.getElementById("q");
if(!q.value) return;

let chat=document.getElementById("chat");
document.getElementById("newChat").style.display="none";

/* USER */
let u=document.createElement("div");
u.className="message user";
u.innerText=q.value;
chat.appendChild(u);

/* BOT */
let b=document.createElement("div");
b.className="message bot";
b.innerHTML="Thinking...<div class='actions'>\
<span>📋</span><span>👍</span><span>👎</span><span>🔄</span><span>⋯</span>\
</div>";
chat.appendChild(b);

q.value="";

setTimeout(()=>{
b.childNodes[0].textContent="Response generated.";
},800);
}

/* UPGRADE */
function openUpgrade(){
document.getElementById("upgrade").style.display="flex";
}
function closeUpgrade(){
document.getElementById("upgrade").style.display="none";
}
</script>

</body>
</html>
