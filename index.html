<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyGenius AI</title>

<style>
/* PREMIUM FINAL POLISH */
body{margin:0;font-family:system-ui;background:#181818;color:#fff;display:flex;height:100vh;transition:.3s}
body.light{background:#f9fafb;color:#111}

.sidebar{width:220px;background:#202123;padding:12px;display:flex;flex-direction:column;justify-content:space-between;transition:.3s}
.sidebar.collapsed{width:70px}

.btn{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;background:none;border:none;color:inherit;cursor:pointer;transition:.2s}
.btn:hover{background:#2a2b32;transform:scale(1.02)}

.yourChats{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin:10px 0;color:#aaa;cursor:pointer}

.chatItem{display:flex;justify-content:space-between;align-items:center;padding:8px;border-radius:6px;font-size:14px}
.chatItem:hover{background:#2a2b32}

.main{flex:1;display:flex;flex-direction:column}

.topbar{height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 15px;border-bottom:1px solid #333;position:relative;background:rgba(0,0,0,0.3);backdrop-filter:blur(6px)}

.planCapsule{position:absolute;left:50%;transform:translateX(-50%);background:#2a2a2a;padding:5px 16px;border-radius:20px;font-size:12px;border:1px solid #444}

.chat{flex:1;overflow:auto;padding:20px}
.message{max-width:70%;padding:12px;margin:10px 0;border-radius:14px;animation:fadeIn .3s}
.user{margin-left:auto;background:linear-gradient(45deg,#3b82f6,#06b6d4)}
.bot{background:#242424}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.inputBar{padding:10px;border-top:1px solid #333}
.inputBox{display:flex;gap:10px;background:#2a2a2a;padding:12px;border-radius:16px;transition:.2s}
.inputBox:focus-within{box-shadow:0 0 0 1px #10a37f}

input{flex:1;background:none;border:none;color:inherit;outline:none}

.actionBtn{cursor:pointer;padding:6px;border-radius:8px;transition:.2s}
.actionBtn:hover{background:#333;transform:scale(1.1)}

.footerNote{font-size:10px;text-align:center;opacity:.6;margin-top:6px}

.homeScreen{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.homeTitle{font-size:30px;margin-bottom:20px;font-weight:600}

</style>
</head>

<body>

<div class="sidebar">
  <div>
    <button class="btn" onclick="newChat()">New Chat</button>
    <button class="btn">Search Chats</button>
    <button class="btn">Images</button>
    <button class="btn">Apps</button>

    <div class="yourChats" onclick="toggleChats()">
      <span>Your Chats</span>
      <span id="arrow">▼</span>
    </div>

    <div id="chatList">
      <div class="chatItem">
        <span>Example Chat</span>
        <span>⋯</span>
      </div>
    </div>
  </div>

  <div>
    <div>Pranab</div>
    <div style="font-size:12px;opacity:.7">Free</div>
    <button class="btn">Upgrade Plan</button>
  </div>
</div>

<div class="main">

<div class="topbar">
  <div>StudyGenius AI</div>
  <div class="planCapsule">Free</div>
  <div onclick="toggleTheme()" style="cursor:pointer">🌗</div>
</div>

<div id="home" class="homeScreen">
  <div class="homeTitle">What are you working on?</div>
</div>

<div id="chat" class="chat" style="display:none"></div>

<div class="inputBar">
  <div class="inputBox">
    <input id="q" placeholder="Ask anything" onkeydown="if(event.key==='Enter')send()">
    <div class="actionBtn" onclick="send()">➤</div>
  </div>
  <div class="footerNote">StudyGenius AI can make mistakes. Check important info. See cookie preferences.</div>
</div>

</div>

<script>
function toggleChats(){
  let list=document.getElementById('chatList');
  let arrow=document.getElementById('arrow');
  if(list.style.display==='none'){
    list.style.display='block';
    arrow.innerText='▼';
  }else{
    list.style.display='none';
    arrow.innerText='▶';
  }
}

function newChat(){
  document.getElementById('home').style.display='flex';
  document.getElementById('chat').style.display='none';
}

function send(){
  let q=document.getElementById('q');
  if(!q.value.trim())return;

  document.getElementById('home').style.display='none';
  let chat=document.getElementById('chat');
  chat.style.display='block';

  let user=document.createElement('div');
  user.className='message user';
  user.innerText=q.value;
  chat.appendChild(user);

  let bot=document.createElement('div');
  bot.className='message bot';
  bot.innerText='Thinking...';
  chat.appendChild(bot);

  q.value='';

  setTimeout(()=>{
    bot.innerText='Response generated.';
  },800);
}

function toggleTheme(){
  document.body.classList.toggle('light');
}
</script>

</body>
</html>
