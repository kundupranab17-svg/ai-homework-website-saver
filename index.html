<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StudyGenius AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== EXISTING CSS (UNCHANGED) ===== */
body.dark{background:#181818;color:white;}
body.light{background:#fff;color:#111;}
body{margin:0;font-family:system-ui;display:flex;height:100vh;}

/* ===== ADDITIONS (SAFE) ===== */

/* TOGGLE CHAT LIST */
#chatList{transition:0.3s ease;overflow:hidden;}
.chatHidden{height:0;opacity:0;}

/* ARROW */
.chatArrow{transition:0.3s;}

/* NEW CHAT CENTER */
.newChatScreen{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
opacity:0.9;
}
.newChatScreen h1{font-size:32px;margin-bottom:20px;}

/* ACTION ICONS */
.msgActions{
display:flex;
gap:12px;
margin-top:6px;
opacity:0.6;
font-size:12px;
}
.msgActions span{cursor:pointer;}
.msgActions span:hover{opacity:1;}

/* CAPSULE */
.planCapsule{
position:absolute;
left:50%;
transform:translateX(-50%);
top:10px;
background:#2a2a2a;
padding:4px 14px;
border-radius:20px;
font-size:12px;
}

/* UPGRADE POPUP */
.upgradePopup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}
.upgradeBox{
background:#1f1f1f;
padding:20px;
border-radius:12px;
width:320px;
}
.upgradeBox button{
width:100%;
margin-top:10px;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

/* FOOTER */
.footerNote{
text-align:center;
font-size:11px;
opacity:0.6;
margin-top:6px;
}

</style>
</head>

<body class="dark">

<!-- SPLASH SAME -->
<div id="splash">
  <div id="logoAnim"><img src="logo.png"></div>
</div>

<div id="app" style="display:none; width:100%; display:flex;">

<!-- SIDEBAR SAME (JUST ADD ARROW) -->
<div class="sidebar">
  <div>

    <div class="yourChats" onclick="toggleChats()" style="display:flex;justify-content:space-between;cursor:pointer;">
      <span>Your Chats</span>
      <span id="chatArrow" class="chatArrow">▼</span>
    </div>

    <div id="chatList">
      <!-- SAME ITEMS -->
    </div>

  </div>

  <div>
    <div class="planBtn" onclick="openUpgrade()">Upgrade Plan</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
  <div>StudyGenius AI</div>
</div>

<div class="planCapsule">Free</div>

<!-- NEW CHAT UI -->
<div id="newChat" class="newChatScreen">
<h1>What are you working on?</h1>
</div>

<div class="chat" id="chat"></div>

<div class="inputBar">
  <div class="inputBox">

    <input id="q" placeholder="Ask anything"
    onkeydown="if(event.key==='Enter') handleAction()">

    <div class="actionBtn" onclick="handleAction()">➤</div>

  </div>

  <div class="footerNote">
    StudyGenius AI can make mistakes. Check important info.
  </div>
</div>

</div>
</div>

<!-- UPGRADE -->
<div class="upgradePopup" id="upgradePopup">
  <div class="upgradeBox">
    <h3>Plans</h3>
    <button>Free</button>
    <button>Pro</button>
    <button onclick="closeUpgrade()">Close</button>
  </div>
</div>

<script>

/* SPLASH */
window.onload=()=>{
setTimeout(()=>{
splash.style.display="none";
app.style.display="flex";
},1200);

/* AUTO THEME */
let h=new Date().getHours();
if(h>=6 && h<18){
document.body.classList.remove("dark");
document.body.classList.add("light");
}
};

/* CHAT TOGGLE */
function toggleChats(){
let list=document.getElementById("chatList");
let arrow=document.getElementById("chatArrow");

if(list.classList.contains("chatHidden")){
list.classList.remove("chatHidden");
arrow.innerText="▼";
}else{
list.classList.add("chatHidden");
arrow.innerText="▶";
}
}

/* NEW CHAT */
function showNewChat(){
document.getElementById("chat").innerHTML="";
document.getElementById("newChat").style.display="block";
}

/* SEND */
function handleAction(){
let q=document.getElementById("q");
if(!q.value.trim()) return;

let chat=document.getElementById("chat");
document.getElementById("newChat").style.display="none";

/* USER */
let user=document.createElement("div");
user.className="message user";
user.innerText=q.value;
chat.appendChild(user);

/* BOT */
let bot=document.createElement("div");
bot.className="message bot";
bot.innerHTML=`Thinking...
<div class="msgActions">
<span>📋</span>
<span>👍</span>
<span>👎</span>
<span>🔄</span>
<span>⋯</span>
</div>`;
chat.appendChild(bot);

q.value="";

setTimeout(()=>{
bot.childNodes[0].textContent="Response generated.";
},800);
}

/* UPGRADE */
function openUpgrade(){
document.getElementById("upgradePopup").style.display="flex";
}
function closeUpgrade(){
document.getElementById("upgradePopup").style.display="none";
}

</script>

</body>
</html>
